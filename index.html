<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Generador de Historias</title>
<style>
body{font-family:Arial;max-width:900px;margin:auto;padding:20px}
button{margin:5px;padding:10px;cursor:pointer}
</style>
</head>
<body>

<h1>Generador de Ideas</h1>

<p><b>Plantilla:</b></p>
<p>
Un/a ___ que ___ debe ___ pero ___ mientras ___ lo que pone en riesgo ___<br>
👉 Tema ___ 👉 Mensaje ___ 👉 Género ___ 👉 Público ___ 👉 Longitud ___
</p>

<h3>Configuración</h3>

<label><input type="checkbox" id="safe" checked onchange="toggleSpice()"> Apto para todos</label><br>
<label><input type="checkbox" id="romance" checked> Incluir romance</label><br>

<div id="spiceBox" style="display:none">
Spice: <span id="spiceVal">0</span><br>
<input type="range" min="0" max="5" value="0" id="spice" oninput="spiceVal.innerText=this.value">
</div>

<br>
<button onclick="go('auto.html')">Modo automático</button>
<button onclick="go('guided.html')">Modo guiado</button>

<h3>Contacto</h3>
<p>needlesslordwrites@gmail.com</p>

<script>
function toggleSpice(){
document.getElementById("spiceBox").style.display = document.getElementById("safe").checked ? "none" : "block";
}

function go(page){
localStorage.setItem("safe",safe.checked);
localStorage.setItem("romance",romance.checked);
localStorage.setItem("spice",spice.value);
location=page;
}
</script>

</body>
</html>
